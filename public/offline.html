<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - TalentCrew</title>
    <meta name="theme-color" content="#007ABF" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      body {
        background: #f8fafc;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .card {
        background: #ffffff;
        border-radius: 1rem;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        max-width: 520px;
        padding: 2rem;
        text-align: center;
      }
      a {
        color: #0f172a;
        text-decoration: none;
        font-weight: 700;
      }
      .button {
        background: #007abf;
        border: none;
        border-radius: 999px;
        color: white;
        cursor: pointer;
        display: inline-flex;
        font-weight: 600;
        margin-top: 1.5rem;
        padding: 0.85rem 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        TalentCrew is currently offline. Please check your connection and try again.
      </p>
      <p>
        When you reconnect, the app will restore data and retry network actions automatically.
      </p>
      <a class="button" href="/">Return to app</a>
    </div>
  </body>
</html>
